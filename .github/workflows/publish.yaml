name: Docker Build & Push to GHCR

on:
  #trigger
  workflow_call:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get sanitized commit message
        id: commit_msg
        run: |
          RAW_MSG=$(git log -1 --pretty=format:"%s")
          SAFE_TAG=$(echo "$RAW_MSG" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g' | sed 's/[^a-z0-9_.-]//g')
          echo "commit_tag=$SAFE_TAG" >> $GITHUB_OUTPUT

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.commit_msg.outputs.commit_tag }}

